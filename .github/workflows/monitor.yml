name: Trading Signal Monitor

on:
  # Ejecutar cada 30 minutos
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes

  # Permitir ejecución manual desde GitHub UI
  workflow_dispatch:

concurrency:
  group: trading-signal-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run signal monitor
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python -u monitor.py 2>&1 | tee monitor.log

      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-logs
          path: |
            monitor.log
            buy_the_dip/*.log
            downtrend_breakout/*.log
          retention-days: 7
